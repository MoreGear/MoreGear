<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoreGear - Gaming Deals & Promo Codes</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e8001a;
    --red-dark: #a80012;
    --red-glow: rgba(232,0,26,0.25);
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --border: rgba(255,255,255,0.07);
    --border-red: rgba(232,0,26,0.4);
    --text: #f0f0f0;
    --muted: #888;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  /* HERO */
  .hero {
    position: relative;
    padding: 0 2rem;
    border-bottom: 1px solid var(--border);
    overflow: hidden;
  }

  .hero::after {
    content: '';
    position: absolute;
    top: -80px; left: -80px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(232,0,26,0.12) 0%, transparent 70%);
    pointer-events: none;
  }

  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.5rem 0;
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #fff;
  }

  .logo span { color: var(--red); }

  .nav-tag {
    font-size: 11px;
    font-family: var(--font-display);
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 2px;
  }

  .hero-body {
    padding: 4rem 0 5rem;
    position: relative;
    z-index: 1;
    max-width: 700px;
  }

  .hero-eyebrow {
    font-family: var(--font-display);
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--red);
    margin-bottom: 1rem;
  }

  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(52px, 8vw, 88px);
    font-weight: 800;
    line-height: 0.95;
    text-transform: uppercase;
    letter-spacing: -1px;
    color: #fff;
    margin-bottom: 1.5rem;
  }

  .hero-title .accent { color: var(--red); }

  .hero-sub {
    font-size: 16px;
    color: var(--muted);
    max-width: 480px;
    line-height: 1.6;
  }

  /* diagonal red line */
  .hero-line {
    position: absolute;
    right: 0; top: 0; bottom: 0;
    width: 3px;
    background: linear-gradient(to bottom, transparent, var(--red), transparent);
    opacity: 0.5;
  }

  /* MAIN */
  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 3rem 2rem;
  }

  /* FILTER */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .section-title {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .filters {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 7px 16px;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover {
    border-color: var(--border-red);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .card {
    background: var(--bg2);
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 0;
    background: var(--red);
    transition: height 0.25s ease;
  }

  .card:hover { background: var(--bg3); }
  .card:hover::before { height: 100%; }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }

  .brand {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #fff;
  }

  .badge {
    font-family: var(--font-display);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 1px;
    flex-shrink: 0;
  }

  .badge-hot { background: var(--red); color: #fff; }
  .badge-new { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .badge-limited { background: #222; color: var(--muted); border: 1px solid var(--border); }

  .game-label { font-family: var(--font-display); font-size:13px; font-weight:700; letter-spacing:2px; color:var(--text); text-transform:uppercase; margin-bottom:4px; }
  .game-logos { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .game-logo { height:20px; width:auto; opacity:0.8; filter: brightness(0) invert(1); }
  .game-tag { font-family:var(--font-display); font-size:10px; font-weight:700; letter-spacing:1px; color:#fff; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15); padding:3px 6px; border-radius:2px; }

  .mice-scroll {
    display: flex;
    gap: 1px;
    overflow-x: auto;
    scroll-behavior: smooth;
    scrollbar-width: none;
    border: 1px solid var(--border);
    background: var(--border);
  }
  .mice-scroll::-webkit-scrollbar { display: none; }
  .mice-scroll .card {
    min-width: 260px;
    max-width: 260px;
    flex-shrink: 0;
  }

  .scroll-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: var(--bg2);
    border: 1px solid var(--border-red);
    color: var(--red);
    width: 36px;
    height: 36px;
    border-radius: 2px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    z-index: 2;
  }
  .scroll-btn:hover { background: var(--red); color: #fff; }
  .scroll-left { left: -18px; }
  .scroll-right { right: -18px; }

  .category {
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .discount-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
  }

  .code-row {
    display: flex;
    align-items: center;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .code {
    font-family: 'Courier New', monospace;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--red);
    padding: 10px 14px;
    flex: 1;
  }

  .copy-btn {
    background: var(--bg3);
    border: none;
    border-left: 1px solid var(--border);
    color: var(--muted);
    padding: 10px 14px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--font-display);
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .copy-btn:hover { background: var(--red); color: #fff; }

  .visit-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 0;
    width: 100%;
    cursor: pointer;
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
    border-radius: 2px;
    margin-top: 4px;
  }

  .visit-btn:hover {
    border-color: var(--red);
    color: #fff;
    background: var(--red-dark);
  }

  .yt-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 1.5rem;
    padding: 10px 20px;
    background: var(--red);
    color: #fff;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.15s;
  }
  .yt-btn:hover { background: var(--red-dark); }
  footer {
    position: relative;
    z-index: 1;
    border-top: 1px solid var(--border);
    padding: 2rem;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 1px;
  }

  footer span { color: var(--red); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-body { animation: fadeUp 0.6s ease both; }
  .grid { animation: fadeUp 0.6s 0.2s ease both; }

  .card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 2px;
  }

  .deal-count {
    font-family: var(--font-display);
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .deal-count span { color: var(--red); font-weight: 700; }
</style>
</head>
<body>

<div class="hero">
  <div style="max-width:1200px; margin:0 auto;">
    <nav>
      <div class="logo">More<span>Gear</span></div>
      <div class="nav-tag">Gaming Gear</div>
    </nav>
    <div class="hero-body">
      <h1 class="hero-title">You need<br>the <span class="accent">best</span></h1>
      <p class="hero-sub">Hand-picked gaming gear recommendations from the pros. Plus exclusive promo codes and deals when available.</p>
      <a href="https://www.youtube.com/@MoreGearForYou" target="_blank" class="yt-btn">
        <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px;"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        Follow on YouTube
      </a>
    </div>
  </div>
  <div class="hero-line"></div>
</div>

<main>
  <div class="section-header">
    <div class="section-title">// Deals & Promo Codes</div>
  </div>
  <div class="grid" id="deals-grid"></div>

  <div class="section-header" style="margin-top:3rem;">
    <div class="section-title">// Hand-picked mice</div>
    <div class="filters">
      <button class="filter-btn active" onclick="filterMice('all',this)">All</button>
      <button class="filter-btn" onclick="filterMice('razer',this)">Razer</button>
      <button class="filter-btn" onclick="filterMice('hyperx',this)">HyperX</button>
      <button class="filter-btn" onclick="filterMice('benq',this)">BenQ Zowie</button>
    </div>
  </div>
  <div style="position:relative;">
    <div class="mice-scroll" id="mice-scroll"></div>
    <button class="scroll-btn scroll-left" onclick="scrollMice(-1)">&#8592;</button>
    <button class="scroll-btn scroll-right" onclick="scrollMice(1)">&#8594;</button>
  </div>
</main>

<footer>
  <strong style="color:#fff; font-family:'Barlow Condensed',sans-serif; letter-spacing:2px; font-size:15px;">MORE<span>GEAR</span></strong><br><br>
  Affiliate links may earn a commission · Gear recommendations updated regularly
</footer>

<script>
const deals = [
  { brand:"Razer", cat:"laptop", label:"Laptops", code:"GEAR15", discount:"Save up to 15% off Razer Refurbished Laptops", badge:"hot", url:"https://razer.a9yw.net/n4EZgM?url=https://www.razer.com/shop/refurbished/refurb-laptops", img:"razer-laptops.jpg" },
  { brand:"Razer", cat:"chair", label:"Gaming Accessories", code:"", discount:"Razer Freyja - World's First HD Haptic Gaming Cushion", badge:"new", url:"https://razer.a9yw.net/c/7336422/2186808/10229", img:"freyja.jpg" },
];

function renderDeals() {
  document.getElementById('deals-grid').innerHTML = deals.map((d,i) => `
    <div class="card">
      ${d.img ? `<img class="card-img" src="${d.img}" alt="${d.brand}" loading="lazy">` : ''}
      <div class="card-top">
        <div class="brand">${d.brand}</div>
        <span class="badge badge-${d.badge}">${d.badge}</span>
      </div>
      <div class="category">${d.label}</div>
      <div class="discount-text">${d.discount}</div>
      ${d.code ? `<div class="code-row">
        <div class="code" id="c${i}">${d.code}</div>
        <button class="copy-btn" onclick="copy('${d.code}',${i},this)">Copy</button>
      </div>` : '<div style="height:44px;"></div>'}
      <button class="visit-btn" onclick="window.open('${d.url}','_blank')">Visit Store →</button>
    </div>
  `).join('');
}

const hyperx = [
  { brand:"hyperx", label:"Pulsefire Haste 2 Wireless", games:["cs2","valorant","dota2"], url:"https://amzn.to/4fBYtgW", img:"hyperx-haste2-wireless.jpg" },
];

const allMice = [
  { brand:"razer", label:"DeathAdder V3 Pro", games:["cs2","valorant","apex"], url:"https://amzn.to/43sohVw", img:"deathadder-v3-pro.jpg", discount:"47% OFF", original:"$149.99" },
  { brand:"razer", label:"DeathAdder V3 HyperSpeed", games:["cs2","valorant"], url:"https://amzn.to/4v7Ug9n", img:"deathadder-hyperspeed.jpg", discount:"15% OFF", original:"$99.99" },
  { brand:"razer", label:"Viper V3 Pro", games:["cs2","valorant","apex"], url:"https://amzn.to/4uq7MFl", img:"viper-v3-pro.jpg", discount:"", original:"" },
  { brand:"razer", label:"Viper V3 HyperSpeed", games:["cs2","valorant"], url:"https://amzn.to/4wNlILk", img:"viper-hyperspeed.jpg", discount:"14% OFF", original:"$69.99" },
  { brand:"hyperx", label:"Pulsefire Haste 2 Wireless", games:["cs2","valorant","apex"], url:"https://amzn.to/4fBYtgW", img:"hyperx-haste2-wireless.jpg", discount:"34% OFF", original:"$89.99" },
  { brand:"benq", label:"Zowie U2 Wireless", games:["cs2","valorant"], url:"https://amzn.to/4wMbIlv", img:"zowie-u2.jpg", discount:"", original:"" },
  { brand:"benq", label:"Zowie FK2-DW", games:["cs2","r6s"], url:"https://amzn.to/4fKhKNc", img:"benq-fk2-dw.jpg", discount:"6% OFF", original:"$159.99" },
  { brand:"benq", label:"Zowie U2-DW", games:["cs2","valorant"], url:"https://amzn.to/4dFAfA1", img:"benq-u2-dw.jpg", discount:"", original:"" },
];

const gameLogos = {
  cs2: { type:'img', src:'https://cdn.simpleicons.org/counterstrike' },
  valorant: { type:'img', src:'https://cdn.simpleicons.org/valorant' },
  dota2: { type:'img', src:'https://cdn.simpleicons.org/dota2' },
  lol: { type:'img', src:'https://cdn.simpleicons.org/leagueoflegends' },
  apex: { type:'img', src:'apex.png' },
  pubg: { type:'img', src:'pubg.png' },
  r6s: { type:'img', src:'r6s.png' },
  warzone: { type:'img', src:'warzone.png' },
};

const gameNames = { cs2:'CS2', valorant:'Valorant', dota2:'DOTA2', lol:'LoL', apex:'Apex', pubg:'PUBG', r6s:'R6S', warzone:'Warzone' };
const brandNames = { razer:'Razer', hyperx:'HyperX', benq:'BenQ Zowie' };

let activeMiceBrand = 'all';

function filterMice(brand, btn) {
  activeMiceBrand = brand;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderMiceScroll();
}

function scrollMice(dir) {
  const el = document.getElementById('mice-scroll');
  el.scrollBy({ left: dir * 280, behavior: 'smooth' });
}

function renderMiceScroll() {
  const filtered = activeMiceBrand === 'all' ? allMice : allMice.filter(d => d.brand === activeMiceBrand);
  document.getElementById('mice-scroll').innerHTML = filtered.map((d,i) => `
    <div class="card" style="display:flex; flex-direction:column; min-width:260px; max-width:260px;">
      <div style="position:relative;">
        ${d.img ? `<img class="card-img" src="${d.img}" alt="${d.label}" loading="lazy">` : ''}
        ${d.discount ? `<div style="position:absolute; top:-18px; right:-18px; background:var(--red); color:#fff; font-family:var(--font-display); font-size:13px; font-weight:700; width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; letter-spacing:0.5px; z-index:1;">-${d.discount.split('%')[0].replace('-','').trim()}%</div>` : ''}
      </div>
      <div class="card-top">
        <div class="brand">${d.label}</div>
      </div>
      <div class="category">${brandNames[d.brand]}</div>
      <div class="game-label">Best for:</div>
      <div class="game-logos">
        ${d.games.map(g => gameLogos[g].type === 'img' 
          ? `<img class="game-logo" src="${gameLogos[g].src}" alt="${gameNames[g]}" title="${gameNames[g]}">` 
          : `<span class="game-tag" title="${gameNames[g]}">${gameLogos[g].label}</span>`
        ).join('')}
      </div>
      <div style="flex:1; min-height:12px;"></div>
      <button class="visit-btn" onclick="window.open('${d.url}','_blank')" style="margin-top:12px;">View Product →</button>
    </div>
  `).join('');
}

function copy(code, i, btn) {
  navigator.clipboard.writeText(code).catch(()=>{});
  btn.textContent = 'Copied!';
  btn.style.background = '#1a5c1a';
  btn.style.color = '#4caf50';
  setTimeout(() => { btn.textContent = 'Copy'; btn.style.background=''; btn.style.color=''; }, 1500);
}

renderDeals();
renderMiceScroll();
</script>
</body>
</html>
